<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alphanumeric Counter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1 id="header">Type/paste your text below.</h1>

  <textarea id="textInput" placeholder="Type or paste your text here..."></textarea><br>
  <div class="button-row">
    <button type="button" onclick="countAlphanumerics()">Submit</button>
    <button type="button" class="button-reset" onclick="resetTextInput()">Reset</button>
  </div>


<script src="index.js"></script>
</body>
</html>
